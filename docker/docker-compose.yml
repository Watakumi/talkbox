services:
  db:
    image: mysql:8.0
    container_name: talkbox-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: talkbox
      MYSQL_USER: talkbox
      MYSQL_PASSWORD: talkbox
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: talkbox-api
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=mysql://talkbox:talkbox@db:3306/talkbox
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: talkbox-web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  db_data:
